<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 语句格式化工具</title>
    <!-- 引入 Prism.js 深色主题和 SQL 高亮支持 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-dark.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <!-- 引入 sql-formatter 用于格式化 SQL -->
    <script src="https://cdn.jsdelivr.net/npm/sql-formatter@15.3.2/dist/sql-formatter.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1e1e1e; /* 深色背景，匹配 Grok 3 风格 */
            color: #ffffff; /* 白色文字 */
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        textarea, pre {
            width: 100%;
            min-height: 200px;
            font-size: 14px;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
        }
        textarea {
            background-color: #2d2d2d;
            color: #ffffff;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        pre {
            background-color: #2d2d2d; /* 深色代码块背景 */
            overflow-x: auto;
        }
        /* 自定义 Prism.js 样式以匹配 Grok 3 的 SQL 高亮风格 */
        .language-sql .keyword {
            color: #569cd6; /* 蓝色关键字 */
        }
        .language-sql .string {
            color: #ce9178; /* 绿色字符串 */
        }
        .language-sql .number {
            color: #b5cea8; /* 橙色数字 */
        }
        .language-sql .function {
            color: #dcdcaa; /* 函数名颜色 */
        }
        .language-sql .operator {
            color: #d4d4d4; /* 运算符颜色 */
        }
        #detectedType {
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>SQL 语句格式化工具</h2>
        <!-- 显示检测到的 SQL 类型 -->
        <div id="detectedType">检测到的 SQL 类型：未检测</div>
        <!-- 输入 SQL 语句 -->
        <textarea id="sqlInput" placeholder="请输入 SQL 语句..."></textarea>
        <!-- 按钮组：粘贴和格式化 -->
        <div class="button-group">
            <button onclick="pasteFromClipboard()">粘贴</button>
            <button onclick="formatSQL()">格式化</button>
        </div>
        <!-- 格式化后的输出区域 -->
        <pre><code id="sqlOutput" class="language-sql"></code></pre>
    </div>

    <script>
        // 获取 DOM 元素
        const sqlInput = document.getElementById('sqlInput');
        const sqlOutput = document.getElementById('sqlOutput');
        const detectedType = document.getElementById('detectedType');

        // 预处理 SQL 语句，修正可能导致格式化失败的语法
        function preprocessSQL(sql, dialect) {
            let processedSQL = sql.trim();
            if (dialect === 'tsql') {
                // 为 TOP 子句添加括号，确保 sql-formatter 能正确解析
                processedSQL = processedSQL.replace(
                    /\bTOP\s+(\d+)\b/i,
                    'TOP ($1)'
                );
                // 清理多余空格和换行，规范化输入
                processedSQL = processedSQL.replace(/\s+/g, ' ').trim();
                // 确保 dbo. 前后格式正确
                processedSQL = processedSQL.replace(/\bdbo\.\s*(\w+)/gi, 'dbo.$1');
            }
            return processedSQL;
        }

        // 自动检测 SQL 类型的函数
        function detectSQLDialect(sql) {
            const sqlLower = sql.toLowerCase();
            // MySQL 特征关键字
            const mysqlKeywords = ['limit', 'ifnull', 'regexp', '`', 'on duplicate key'];
            // SQL Server 特征关键字
            const tsqlKeywords = ['top', 'dbo.', 'convert(', 'getdate()'];
            
            let isMySQL = mysqlKeywords.some(keyword => sqlLower.includes(keyword));
            let isTSQL = tsqlKeywords.some(keyword => sqlLower.includes(keyword));

            // 优先检测 SQL Server（TSQL），因为示例语句包含 TOP
            if (isTSQL) {
                return 'tsql';
            } else if (isMySQL) {
                return 'mysql';
            } else {
                return 'mysql'; // 默认使用 MySQL
            }
        }

        // 从剪贴板粘贴文本并自动格式化
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                sqlInput.value = text;
                detectedType.textContent = '检测到的 SQL 类型：未检测';
                sqlOutput.textContent = ''; // 清空输出区域
                // 自动触发格式化
                if (text.trim()) {
                    formatSQL();
                }
            } catch (error) {
                alert('无法访问剪贴板，请手动粘贴！\n错误信息：' + error.message);
            }
        }

        // 格式化 SQL 的函数
        function formatSQL() {
            const input = sqlInput.value.trim();
            if (!input) {
                alert('请输入有效的 SQL 语句！');
                return;
            }

            try {
                // 自动检测 SQL 类型
                const dialect = detectSQLDialect(input);
                detectedType.textContent = `检测到的 SQL 类型：${dialect === 'mysql' ? 'MySQL' : 'SQL Server'}`;

                // 预处理 SQL 语句
                const processedSQL = preprocessSQL(input, dialect);

                // 格式化 SQL 语句
                const formattedSQL = sqlFormatter.format(processedSQL, {
                    language: dialect, // 使用检测到的方言（mysql 或 tsql）
                    indent: '    ',   // 4 个空格缩进
                    uppercase: true,   // 关键字大写
                    linesBetweenQueries: 2 // 查询之间空两行
                });

                // 显示格式化后的 SQL 并触发 Prism 高亮
                sqlOutput.textContent = formattedSQL;
                Prism.highlightElement(sqlOutput);
            } catch (error) {
                alert('SQL 语句格式化失败，请检查输入！\n错误信息：' + error.message);
            }
        }

        // 绑定 Enter 键事件，按 Ctrl + Enter 执行格式化
        sqlInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && event.ctrlKey) {
                formatSQL();
            }
        });
    </script>
</body>
</html>
