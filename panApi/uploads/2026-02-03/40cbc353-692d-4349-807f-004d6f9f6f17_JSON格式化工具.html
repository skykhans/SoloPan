<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

<body>
    <div class="container">
        <h2>✨ JSON 格式化与压缩工具</h2>
        <textarea id="jsonInput" placeholder="请输入 JSON 数据..."></textarea>
        <div id="status">🔍 等待验证...</div>
        <div class="buttons">
            <button onclick="formatJSON()">格式化</button>
            <button onclick="compressJSON()">压缩</button>
            <button onclick="copyResult()">复制结果</button>
            <button onclick="downloadJSON()">下载结果</button>
            <button onclick="showHistory()">查看历史</button>
        </div>
        <h3>结果：</h3>
        <div id="output"></div>
    </div>

    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="header">
                <h3>历史记录</h3>
                <button class="clear-btn" onclick="clearHistory()">清空历史</button>
            </div>
            <ul id="historyList"></ul>
        </div>
    </div>

    <script>
        // 获取 DOM 元素
        const inputEl = document.getElementById("jsonInput");
        const statusEl = document.getElementById("status");
        const outputEl = document.getElementById("output");
        const historyModal = document.getElementById("historyModal");
        const historyListEl = document.getElementById("historyList");

        // 加载历史记录
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem("jsonHistory") || "[]");
            historyListEl.innerHTML = "";
            history.forEach((item, index) => {
                const li = document.createElement("li");
                li.className = "history-item";
                const preview = item.json.length > 50 ? item.json.slice(0, 50) + "..." : item.json;
                li.innerHTML = `
                    <div class="history-content">
                        <span>${item.timestamp}: ${preview}</span>
                        <div class="btn-group">
                            <button class="preview-btn" onclick="previewHistoryItem(${index})">预览</button>
                            <button class="load-btn" onclick="loadHistoryItem(${index})">加载</button>
                            <button class="delete-btn" onclick="deleteHistoryItem(${index})">删除</button>
                        </div>
                    </div>
                    <div class="history-preview" id="preview-${index}"></div>
                `;
                historyListEl.appendChild(li);
            });
        }

        // 保存历史记录
        function saveHistory(json) {
            const history = JSON.parse(localStorage.getItem("jsonHistory") || "[]");
            const timestamp = new Date().toLocaleString();
            history.push({ json, timestamp });
            localStorage.setItem("jsonHistory", JSON.stringify(history));
        }

        // 预览历史记录项
        function previewHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem("jsonHistory") || "[]");
            if (history[index]) {
                const previewEl = document.getElementById(`preview-${index}`);
                previewEl.style.display = previewEl.style.display === "block" ? "none" : "block";
                if (previewEl.style.display === "block") {
                    try {
                        const parsed = JSON.parse(history[index].json);
                        const formatted = JSON.stringify(parsed, null, 2);
                        previewEl.innerHTML = syntaxHighlight(formatted);
                    } catch {
                        previewEl.textContent = history[index].json;
                    }
                }
            }
        }

        // 加载历史记录项
        function loadHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem("jsonHistory") || "[]");
            if (history[index]) {
                inputEl.value = history[index].json;
                formatJSON();
                historyModal.style.display = "none";
            }
        }

        // 删除历史记录项
        function deleteHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem("jsonHistory") || "[]");
            history.splice(index, 1);
            localStorage.setItem("jsonHistory", JSON.stringify(history));
            loadHistory();
        }

        // 清空历史记录
        function clearHistory() {
            localStorage.setItem("jsonHistory", "[]");
            loadHistory();
            statusEl.textContent = "✅ 历史记录已清空";
            statusEl.style.color = "#34d399";
        }

        // 显示历史记录弹窗
        function showHistory() {
            loadHistory();
            historyModal.style.display = "flex";
        }

        // 关闭历史记录弹窗（点击阴影区域）
        function closeHistory(event) {
            if (event && event.target === historyModal) {
                historyModal.style.display = "none";
            }
        }

        // 点击空白区域关闭弹窗
        historyModal.addEventListener("click", closeHistory);

        // 实时验证 JSON 输入
        inputEl.addEventListener("input", () => {
            try {
                JSON.parse(inputEl.value);
                statusEl.textContent = "✅ JSON 格式有效";
                statusEl.style.color = "#34d399";
            } catch (err) {
                statusEl.textContent = `❌ JSON 格式无效: ${err.message}`;
                statusEl.style.color = "#f87171";
            }
        });

        // 高亮 JSON 字符串
        function syntaxHighlight(json) {
            if (typeof json !== "string") {
                json = JSON.stringify(json, null, 2);
            }

            // 转义 HTML 特殊字符
            json = json
                .replace(/&/g, "&")
                .replace(/</g, "<")
                .replace(/>/g, ">");

            // 定义大括号和键名颜色池
            const braceColors = ["brace-level-0", "brace-level-1", "brace-level-2", "brace-level-3"];
            const keyColors = ["key-0", "key-1", "key-2", "key-3"];
            let braceLevel = 0;
            let result = "";
            let i = 0;

            while (i < json.length) {
                const char = json[i];

                if (char === "{") {
                    // 为左大括号分配颜色
                    result += `<span class="${braceColors[braceLevel % braceColors.length]}">{</span>`;
                    braceLevel++;
                    i++;
                } else if (char === "}") {
                    // 为右大括号分配对应颜色
                    braceLevel--;
                    result += `<span class="${braceColors[braceLevel % braceColors.length]}">}</span>`;
                    i++;
                } else if (char === "[") {
                    // 数组左括号
                    result += `<span class="array-bracket">[</span>`;
                    i++;
                } else if (char === "]") {
                    // 数组右括号
                    result += `<span class="array-bracket">]</span>`;
                    i++;
                } else if (char === '"') {
                    // 处理字符串
                    let str = '"';
                    i++;
                    while (i < json.length && (json[i] !== '"' || json[i - 1] === "\\")) {
                        str += json[i];
                        i++;
                    }
                    if (i < json.length) {
                        str += '"';
                        i++;
                    }
                    // 判断是否为键（后面跟冒号，跳过空白字符）
                    let isKey = false;
                    let j = i;
                    while (j < json.length && /\s/.test(json[j])) {
                        j++;
                    }
                    if (j < json.length && json[j] === ":") {
                        isKey = true;
                    }
                    // 为键名分配层级颜色
                    if (isKey) {
                        result += `<span class="${keyColors[braceLevel % keyColors.length]}">${str}</span>`;
                    } else {
                        result += `<span class="string">${str}</span>`;
                    }
                } else {
                    // 使用正则表达式匹配其他类型
                    const rest = json.slice(i);
                    const match = rest.match(
                        /^(\btrue\b|\bfalse\b|\bnull\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/
                    );
                    if (match) {
                        const token = match[0];
                        let cls = "number";
                        if (token === "true" || token === "false") {
                            cls = "boolean";
                        } else if (token === "null") {
                            cls = "null";
                        }
                        result += `<span class="${cls}">${token}</span>`;
                        i += token.length;
                    } else {
                        result += char;
                        i++;
                    }
                }
            }

            return result;
        }

        // 格式化 JSON
        function formatJSON() {
            try {
                const parsed = JSON.parse(inputEl.value);
                const formatted = JSON.stringify(parsed, null, 2);
                outputEl.innerHTML = syntaxHighlight(formatted);
                statusEl.textContent = "✅ 格式化成功";
                statusEl.style.color = "#34d399";
                saveHistory(formatted);
            } catch (err) {
                outputEl.textContent = `❌ JSON 格式错误: ${err.message}`;
                statusEl.textContent = `❌ JSON 格式错误: ${err.message}`;
                statusEl.style.color = "#f87171";
            }
        }

        // 压缩 JSON
        function compressJSON() {
            try {
                const parsed = JSON.parse(inputEl.value);
                const compressed = JSON.stringify(parsed);
                outputEl.textContent = compressed;
                statusEl.textContent = "✅ 压缩成功";
                statusEl.style.color = "#34d399";
                saveHistory(compressed);
            } catch (err) {
                outputEl.textContent = `❌ JSON 格式错误: ${err.message}`;
                statusEl.textContent = `❌ JSON 格式错误: ${err.message}`;
                statusEl.style.color = "#f87171";
            }
        }

        // 复制结果
        function copyResult() {
            const text = outputEl.innerText || outputEl.textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ 已复制到剪贴板！");
            }).catch(() => {
                alert("⚠️ 复制失败，请手动复制。");
            });
        }

        // 下载 JSON 文件
        function downloadJSON() {
            const data = outputEl.innerText || outputEl.textContent;
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "result.json";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
