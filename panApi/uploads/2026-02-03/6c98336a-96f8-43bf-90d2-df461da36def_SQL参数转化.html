<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

<script>
    function replaceParams() {
        // 获取 SQL 输入
        let sql = document.getElementById("sql-input").value.trim();
        // 获取参数输入
        let paramInput = document.getElementById("param-input").value.trim();

        // 使用正则表达式匹配 value(type) 格式，处理值中包含逗号的情况
        let paramRegex = /([^,]+?\([^)]+\))(?:,|$)/g;
        let params = [];
        let match;
        while ((match = paramRegex.exec(paramInput)) !== null) {
            params.push(match[1].trim());
        }

        // 验证参数格式
        if (params.length === 0 && paramInput) {
            alert("参数格式错误，请使用 value(type) 格式，例如: zh_CN(String), 13(Long)");
            return;
        }

        let outputSql = sql;
        let paramIndex = 0;

        // 替换所有的 ? 占位符
        while (outputSql.includes("?") && paramIndex < params.length) {
            let param = params[paramIndex];
            // 匹配 value 和 type
            let paramParts = param.match(/^(.+?)\((String|Long|Integer|Timestamp)\)$/i);
            if (!paramParts) {
                alert(`参数 ${param} 格式错误，应为 value(type)`);
                return;
            }
            let paramValue = paramParts[1];
            let paramType = paramParts[2].toLowerCase();

            // 根据类型处理参数值
            if (paramType === "string" || paramType === "timestamp") {
                paramValue = `'${paramValue}'`;
            }
            // 用带有样式的 span 包裹参数值
            outputSql = outputSql.replace("?", `<span class="param-value">${paramValue}</span>`);
            paramIndex++;
        }

        // 验证参数数量是否匹配
        if (paramIndex < params.length) {
            alert("警告：提供的参数数量多于 SQL 中的占位符！");
        } else if (outputSql.includes("?")) {
            alert("警告：SQL 中的占位符多于提供的参数！");
        }

        // 更新输出区域
        let output = document.getElementById("output");
        output.innerHTML = outputSql.replace(/\n/g, '<br>');
        hljs.highlightAll();
    }

    function copyToClipboard() {
        // 执行参数替换
        replaceParams();
        // 获取输出内容
        let output = document.getElementById("output");
        let text = output.innerText;
        // 复制到剪贴板
        navigator.clipboard.writeText(text).then(() => {
            // alert("已复制到剪贴板！");
        }).catch(err => {
            console.error("复制失败：", err);
            alert("复制失败，请手动复制输出内容！");
        });
    }
</script>
